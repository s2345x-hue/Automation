name: Morning Scan

on:
  schedule:
    # 毎朝 JST 6:30 に実行（UTC 21:30、前日扱い）。時間を変えたい場合はここを調整
    - cron: '30 21 * * *'
  workflow_dispatch: {}  # Actionsタブから手動実行もできるようにする

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scan
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
        run: node scan.mjs

      - name: Commit result
        run: |
          git config user.name "morning-scan-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/scan.json
          git diff --quiet --cached || git commit -m "chore: update scan results $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
